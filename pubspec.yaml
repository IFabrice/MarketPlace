name: ndangira
description: Ndangira — Rwandan Hyper-Local Marketplace connecting vendors and consumers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.2.0
  firebase_messaging: ^15.1.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # UI/UX
  pinput: ^5.0.0
  cached_network_image: ^3.4.0
  flutter_svg: ^2.0.10
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  gap: ^3.0.1

  # Maps & Location
  google_maps_flutter: ^2.7.0
  geolocator: ^13.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
